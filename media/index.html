<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Tokyyto - Media</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../public/styles/main.css">
	<link rel="stylesheet" href="../public/styles/3d.css">
	<link rel="stylesheet" href="../public/styles/gallery.css">
	<link rel="icon" type="image/x-icon" href="../public/images/logo.png">
	<style>

		@media (max-width: 900px) {
			#Bsection1,
			#Bsection2 {
				width: 100%;
			}
		}


		#Bsection1 {
	width: 35%;
	background: linear-gradient(to left, lightblue -100%, transparent 100%);
	min-height: 100lvh;
	position: sticky;
  	top: 0;
}
#Bsection2 {
	width: 65%;
	min-height: 200lvh;
}
#Bsection2in {
	min-height: 100lvh;
	width: 100%;
	display: flex;
	justify-content: flex-end; 
	flex-direction: column;
	background: linear-gradient(to right, lightblue -100%, transparent 50%);
}

#Bsection2in2 {
	width: 100%;
	display: flex;
	justify-content: center; 
	flex-direction: column;
	background: linear-gradient(to right, lightblue -100%, transparent 50%);
}


@media (max-width: 900px) {
	#Bsection1,
	#Bsection2 {
	width: 100%;
	}
	#Bsection1 {
		background: linear-gradient(to top, lightblue -50%, transparent 100%);
		position: static;
   		top: auto;
   		/*min-height: 50lvh;*/
   		min-height: auto;
	}
	#Bsection2 {
		background: linear-gradient(to top, transparent -00%, lightblue 300%);
		min-height: 0;
	}
	#Bsection2in {
		min-height: auto;
		justify-content: start;
	}
	#Bsection2in2 {
		justify-content: start;
	}
}
	</style>
</head>
<body>
	<svg style="position:absolute;width:0;height:0">
		<defs>
			<filter id="turbWarp">
				<feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="3" seed="2" result="noise"/>
				<feDisplacementMap in="SourceGraphic" in2="noise" scale="10"
				xChannelSelector="R" yChannelSelector="G"/>
			</filter>
		</defs>
	</svg>
	<div class="layout">
		<div id="Bsection1">
			<div style="
				height: 100%; width: 100%;
				display:flex;
				flex-direction: column; 
				padding-top:90px;
			">
				<div  style="display: flex; flex-direction: column; width: fit-content; margin: 0 auto 0 auto; padding: 20px; box-sizing:border-box;
					color: rgba(70, 70, 70, 1.0);
					">
					<div style="display: flex; justify-content: center; align-items:center; gap: 10px; margin-bottom: 16px;">
						<div style="width: 48px; height: 48px; background:white; overflow: hidden; border-radius: 6px;">
							<div style="margin-top: auto; height: 100%; width: 100%;">
								<div class="itemsWrapper">
									<div class="item0">
										<div class="item1"></div>
										<div class="item2"></div>
									</div>
								</div>	
							</div>
						</div>
						<span style="font-size: 14px; opacity:.7" >Tomás Posse | <a style="font-size: 14px" href="https://www.instagram.com/tokyyto" target="_blank">@tokyyto</a></span>
					</div>
					<span style="font-size: 60px; text-align: end; margin:0 0 24px 0; opacity: .95;">MEDIA</span>
				</div>
			</div>
			
		</div>	
		<div id="Bsection2">
			<div id="Bsection2in2">
				



				<div style="margin: 40px 0 30px 0; padding: 0px 0px 0 20px; box-sizing: border-box;">
					<span style="font-size: 24px; opacity: .62;">GenAI</span>
				</div>

				<!-- LinkedIn iframe -->
				<div style="padding: 20px 20px 20px 20px; box-sizing: border-box; display: flex; justify-content: center;">
					<iframe src="https://www.linkedin.com/embed/feed/update/urn:li:ugcPost:7445442002252603392?collapsed=1" height="550" width="504" frameborder="0" allowfullscreen="" title="Embedded post"></iframe>
				</div>
				

				<!-- Assets images in 3 randomized rows -->
				<div id="assetsRows" style="padding: 0 20px 30px 20px; box-sizing: border-box;"></div>
				<script>
				(function() {
					// All images from the assets folder
					const allImages = [
						"auto_0.jpeg","auto_1.jpeg","auto_2.jpeg","auto_3.png","auto_4.jpeg","auto_5.png","auto_6.png","auto_7.png","auto_8.png","auto_9.png",
						"auto_10.png","auto_11.png","auto_12.png","auto_13.png","auto_14.png","auto_15.png","auto_16.png","auto_17.png","auto_18.png","auto_19.png",
						"auto_20.png","auto_21.png","auto_22.png","auto_23.png","auto_24.png","auto_25.png","auto_26.webp","auto_27.webp","auto_28.png","auto_29.webp",
						"auto_30.jpeg","auto_31.jpeg","auto_32.jpeg","auto_33.jpeg","auto_34.jpeg","auto_35.jpeg","auto_36.jpeg","auto_37.jpeg","auto_38.jpeg","auto_39.jpeg",
						"auto_40.jpeg","auto_41.jpeg","auto_42.jpeg","auto_43.jpeg","auto_44.jpeg","auto_45.jpg","auto_46.jpeg","auto_47.jpeg","auto_48.jpeg","auto_49.jpeg",
						"auto_50.jpeg","auto_51.jpeg","auto_52.png","auto_53.png","auto_54.png","auto_55.png","auto_56.png","auto_57.png","auto_58.png","auto_59.png",
						"auto_60.png","auto_61.jpeg"
					];
					const total = allImages.length; // 62
					const rows = 3;

					// Shuffle using Fisher-Yates
					const shuffled = [...allImages];
					for (let i = shuffled.length - 1; i > 0; i--) {
						const j = Math.floor(Math.random() * (i + 1));
						[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
					}

					// Distribute evenly: split into 3 groups (row0 gets extra if remainder)
					const base = Math.floor(total / rows); // 20
					const remainder = total % rows;         // 2
					const groups = [];
					let idx = 0;
					for (let r = 0; r < rows; r++) {
						const size = base + (r < remainder ? 1 : 0);
						groups.push(shuffled.slice(idx, idx + size));
						idx += size;
					}

					const container = document.getElementById("assetsRows");
					groups.forEach(group => {
						const row = document.createElement("div");
						row.style.cssText = "display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;";
						group.forEach(filename => {
							const img = document.createElement("img");
							img.src = "assets/" + filename;
							img.style.cssText = "height: 200px; width: auto; object-fit: cover; border-radius: 4px; flex-shrink: 0;";
							row.appendChild(img);
						});
						container.appendChild(row);
					});
				})();
				</script>


				<div style="margin: 40px 0 30px 0; padding: 0px 0px 0 20px; box-sizing: border-box;">
					<span style="font-size: 24px; opacity: .62;">Art</span>
				</div>

				<!-- Art images in a single alphabetically sorted row -->
				<div id="artRow" style="padding: 0 20px 30px 20px; box-sizing: border-box;"></div>
				<script>
				(function() {
					// All images from the art folder
					const artImages = [
						"a.jpg","b.jpg","c.jpg","d.jpg","e.jpg","f.jpg","g.jpg","h.png","i.png","j.png"
					];

					// Sort alphabetically (case-insensitive)
					artImages.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

					const row = document.createElement("div");
					row.style.cssText = "display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;";
					artImages.forEach(filename => {
						const img = document.createElement("img");
						img.src = "art/" + filename;
						img.style.cssText = "height: 400px; width: auto; object-fit: cover; border-radius: 4px; flex-shrink: 0;";
						row.appendChild(img);
					});

					document.getElementById("artRow").appendChild(row);
				})();
				</script>

				

			</div>
		</div>
	</div>
</body>
</html>
